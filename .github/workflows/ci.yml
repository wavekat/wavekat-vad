name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - run: cargo doc --no-deps -p wavekat-vad --all-features

  features:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "webrtc"
          - "silero"
          - "ten-vad"
          - "serde"
          - "webrtc,silero,ten-vad,serde"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p wavekat-vad --no-default-features --features "${{ matrix.features }}"

  accuracy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - name: Cache testset
        uses: actions/cache@v4
        with:
          path: target/testset
          key: ten-vad-testset-v1
      - name: Run accuracy regression check
        run: |
          cargo test --release -p wavekat-vad --no-default-features \
            --features webrtc,silero,ten-vad \
            -- --ignored accuracy_report --nocapture
