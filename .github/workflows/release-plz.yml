name: Release-plz

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-plz-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      pr-branch: ${{ steps.check-pr.outputs.branch }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5
        id: release-plz
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release PR branch
        id: check-pr
        if: steps.release-plz.outputs.prs_created == 'true'
        run: |
          PR_BRANCH=$(echo '${{ steps.release-plz.outputs.pr }}' | jq -r '.head_branch')
          if [ -n "$PR_BRANCH" ] && [ "$PR_BRANCH" != "null" ]; then
            echo "branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
            echo "Found release PR branch: $PR_BRANCH"
          fi

  update-benchmarks:
    needs: release-plz-pr
    if: needs.release-plz-pr.outputs.pr-branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-plz-pr.outputs.pr-branch }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Cache testset
        uses: actions/cache@v5
        with:
          path: target/testset
          key: ten-vad-testset-v1

      - name: Run accuracy report
        run: |
          cargo test --release -p wavekat-vad --no-default-features \
            --features webrtc,silero,ten-vad \
            -- --ignored accuracy_report --nocapture 2>&1 | tee accuracy-output.txt

      - name: Update README benchmark table
        run: |
          python3 << 'PYEOF'
          import re, sys

          with open('accuracy-output.txt') as f:
              output = f.read()

          version = None
          for line in output.split('\n'):
              if line.startswith('BENCHMARK_VERSION='):
                  version = line.split('=', 1)[1].strip()
                  break

          if not version:
              print("ERROR: No version found in test output")
              sys.exit(1)

          lines = output.split('\n')
          table_lines = [l for l in lines if l.startswith('|')]
          if len(table_lines) < 3:
              print("ERROR: No benchmark table found in test output")
              sys.exit(1)

          table = '\n'.join(table_lines)
          block = f'*v{version}*\n\n{table}'

          with open('README.md') as f:
              readme = f.read()

          pattern = r'(<!-- benchmark-table-start -->).*?(<!-- benchmark-table-end -->)'
          replacement = rf'\1\n{block}\n\2'
          updated = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          if updated == readme:
              print("No changes to README benchmarks")
          else:
              with open('README.md', 'w') as f:
                  f.write(updated)
              print(f"README updated with v{version} benchmarks:")
              print(table)
          PYEOF

      - name: Push benchmark update to release PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No benchmark changes to commit" && exit 0
          git commit -m "docs: update benchmark table"
          git push
